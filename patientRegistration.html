        </nav>

    </header>
    <hr>
    <main>

        <form>
            <h2><center>Patient Registration Form</center></h2>
            <center>
                <table cellspacing="10">
                    
                    <tr>
                        <td>
                            <label>Name: </label>
                            <input type="text" id="nameText" name="nameField">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Password: </label>
                            <input type="password" id="password" name="passwordField">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Email: </label>
                            <input type="email" id="email" name="emailField">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Phone Number: </label>
                            <input type="tel" id="phNO" name="PhNoField">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Date Of Birth: </label>
                            <input type="date" id="dob" name="dobField">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Appointment Date and Time: </label>
                            <input type="datetime-local" id="appointment" name="AppointmentField">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Gender: </label>
                            <input type="radio" id="gender" name="genderField" value="Male"> Male
                            <input type="radio" id="gender" name="genderField" value="Female"> Female
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label>Diseases: </label>
                            <input type="checkbox" id="prob" name="diseasesField" value="Diabeties"> Diabeties
                            <input type="checkbox" id="prob" name="diseasesField" value="BP"> BP
                            <input type="checkbox" id="prob" name="diseasesField" value="Heart Diseas"> Heart Diseas
                            <input type="checkbox" id="prob" name="diseasesField" value="Skin Related"> Skin Related
                        </td>

                    </tr>


                    <tr>
                        <td>
                            <label> Upload Report: </label>
                            <input type="file" id="report" name="reportField">
                        </td>
                    </tr>
                    <tr>
                    
                    <td>
                        <center>
                            <input type="submit" id="submit" name="submitField">
                            <input type="reset" id="reset" name="resetField">
                        </center>
                    </td>
                    </tr>
                </table>
            </center>
        </form>

    </main>
    <hr>

        <p style="text-align: center; color: blue;">copyright@Manikanta</p>
